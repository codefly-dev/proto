syntax = "proto3";
package codefly.base.v0;

import "buf/validate/validate.proto";
import "codefly/base/v0/agent.proto";
import "codefly/base/v0/service.proto";

// ApplicationReference names another application inside a module.
message ApplicationReference {
  // name is the application name.
  string name = 1  [(buf.validate.field).string.min_len = 2, (buf.validate.field).string.max_len = 50];
  // module is the Codefly module name that groups services.
  string module = 2  [(buf.validate.field).string.min_len = 2, (buf.validate.field).string.max_len = 50];
}

// Application is an end-user facing program (CLI, desktop app, etc.)
// Unlike services, applications don't expose network endpoints
// They produce artifacts (binaries, bundles) and can depend on services and other applications
message Application {
  // Name of the application
  string name = 1  [(buf.validate.field).string.min_len = 2, (buf.validate.field).string.max_len = 50];
  // Short description of the application
  string description = 2;
  // Agent that represents the application
  Agent agent = 3;
  // Service dependencies
  repeated ServiceReference service_dependencies = 4;
  // Application dependencies
  repeated ApplicationReference application_dependencies = 5;
  // Build artifacts
  repeated Artifact artifacts = 6;
}

// Artifact represents a build output from an application
message Artifact {
  // Name of the artifact
  string name = 1;
  // Type of artifact: "binary", "bundle", "package"
  string type = 2;
  // Target platform: "darwin-arm64", "linux-amd64", etc.
  string platform = 3;
  // Path to the artifact
  string path = 4;
}

// ApplicationIdentity is the identity of an application in a workspace
message ApplicationIdentity {
  // name is the application name.
  string name = 1  [(buf.validate.field).string.min_len = 2, (buf.validate.field).string.max_len = 50];
  // module is the Codefly module name that groups services.
  string module = 2  [(buf.validate.field).string.min_len = 2, (buf.validate.field).string.max_len = 50];
  // workspace is the Codefly workspace name that scopes modules and services.
  string workspace = 3  [(buf.validate.field).string.min_len = 3, (buf.validate.field).string.max_len = 50];
  // version is the semantic or service-specific version for this resource.
  string version = 4;
}
