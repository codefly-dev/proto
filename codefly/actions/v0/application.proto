syntax = "proto3";
package codefly.actions.v0;

import "buf/validate/validate.proto";
import "codefly/base/v0/agent.proto";

message AddApplication {
    string kind = 1;
    // name is the name of the application.
    string name = 2  [(buf.validate.field).string.min_len = 2, (buf.validate.field).string.max_len = 50];
    // description provides a brief explanation of the application.
    string description = 3;
    // agent is the agent that builds/runs the application.
    codefly.base.v0.Agent agent = 4;
}

message AddApplicationDependency {
    // kind is the type of the action.
    string kind = 1;
    // name is the name of the application.
    string name = 2  [(buf.validate.field).string.min_len = 2, (buf.validate.field).string.max_len = 50];
    // module is the name of the module that the application belongs to.
    string module = 3  [(buf.validate.field).string.min_len = 2, (buf.validate.field).string.max_len = 50];
    // dependency_name is the name of the dependency (another application).
    string dependency_name = 4  [(buf.validate.field).string.min_len = 2, (buf.validate.field).string.max_len = 50];
    // dependency_module is the name of the module that the dependency belongs to.
    string dependency_module = 5  [(buf.validate.field).string.min_len = 2, (buf.validate.field).string.max_len = 50];
}
